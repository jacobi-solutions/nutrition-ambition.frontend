<app-header 
  [title]="'Chat'" 
  [showBackButton]="false" 
  [selectedDate]="selectedDate"
  [userEmail]="userEmail"
  (dateChanged)="onDateChanged($event)"
  (previousDay)="onPreviousDay()"
  (nextDay)="onNextDay()"
  (login)="onLogin()"
  (logout)="onLogout()">
</app-header>

<ion-content [scrollEvents]="true" (ionScroll)="onScroll($event)" #content>
  <div class="ion-padding">
    <div *ngIf="isLoadingHistory" class="loading-container">
      <ion-spinner name="circular"></ion-spinner>
    </div>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>
    
    <div *ngIf="!isLoadingHistory && !error">
      <!-- Messages container -->
      <div class="chat-container">
        <app-chat-message 
          *ngFor="let message of messages" 
          [text]="message.text"
          [isUser]="message.isUser"
          [isTool]="message.isTool || false"
          [timestamp]="message.timestamp">
        </app-chat-message>
        
        <!-- Context note displayed in the message flow -->
        <div *ngIf="contextNote" class="context-note-inline">
          {{ contextNote }}
        </div>
        
        <!-- Typing indicator positioned where next message will appear -->
        <div *ngIf="isLoading" class="typing-indicator bot-message-container">
          <div class="typing-indicator-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<!-- Add the Chat FAB component -->
<app-chat-fab></app-chat-fab>

<!-- Chat input -->
<ion-footer>
  <ion-toolbar>
    <div class="chat-input-container">
      <ion-input 
        placeholder="Type your message..." 
        [(ngModel)]="userMessage"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading">
      </ion-input>
      <ion-button 
        [disabled]="isLoading || !userMessage.trim()" 
        (click)="sendMessage()">
        <ion-icon name="paper-plane-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
