<app-header 
  [title]="'Chat'" 
  [showBackButton]="false" 
  [selectedDate]="selectedDate"
  [userEmail]="userEmail"
  (dateChanged)="onDateChanged($event)"
  (previousDay)="onPreviousDay()"
  (nextDay)="onNextDay()"
  (login)="onLogin()"
  (logout)="onLogout()">
</app-header>

<ion-content #chatContent class="ion-padding">
  <div *ngIf="isLoadingHistory" class="loading-container">
    <ion-spinner name="circular"></ion-spinner>
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  
  <div *ngIf="!isLoadingHistory && !error && messages.length === 0" class="empty-state">
    <ion-text color="medium">
      <p>No chat history available for this date.</p>
    </ion-text>
  </div>

  <div class="chat-container" *ngIf="!isLoadingHistory && messages.length > 0">
    <!-- Messages with markdown support -->
    <div class="messages">
      <app-chat-message 
        *ngFor="let message of messages" 
        [text]="message.text"
        [isUser]="message.isUser"
        [timestamp]="message.timestamp">
      </app-chat-message>
      
      <!-- Typing indicator positioned where next message will appear -->
      <div *ngIf="isLoading" class="typing-indicator bot-message-container">
        <div class="typing-indicator-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<!-- Add the Chat FAB component -->
<app-chat-fab></app-chat-fab>

<!-- Chat input -->
<ion-footer>
  <ion-toolbar>
    <div class="chat-input-container">
      <ion-input 
        placeholder="Type your message..." 
        [(ngModel)]="userMessage"
        (keyup.enter)="sendMessage()"
        [disabled]="isLoading">
      </ion-input>
      <ion-button 
        [disabled]="isLoading || !userMessage.trim()" 
        (click)="sendMessage()">
        <ion-icon name="paper-plane-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
