<ion-card>
  <ion-card-header>
    <ion-card-title>Parsed Food Items</ion-card-title>
    <ion-card-subtitle>Review and edit your food items</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <ion-list *ngIf="foodItems.length > 0">
      <ion-item-sliding *ngFor="let item of foodItems; let i = index">
        <ion-item>
          <ion-input 
            *ngIf="item" 
            label="Food Name" 
            labelPlacement="stacked" 
            placeholder="Enter food name" 
            [(ngModel)]="item.name">
          </ion-input>
          
          
          <div class="quantity-unit-container">
            <ion-input 
              type="number" 
              label="Quantity" 
              labelPlacement="stacked" 
              [value]="item.quantity" 
              (ionInput)="updateQuantity(i, $event)"
              min="0.1" 
              step="0.1"
              class="quantity-input">
            </ion-input>
            
            <!-- <ion-select 
              label="Unit" 
              labelPlacement="stacked" 
              [value]="item.unit" 
              (ionChange)="updateUnit(i, $event)"
              class="unit-select">
              <ion-select-option value="g">grams</ion-select-option>
              <ion-select-option value="oz">ounces</ion-select-option>
              <ion-select-option value="cup">cups</ion-select-option>
              <ion-select-option value="tbsp">tablespoons</ion-select-option>
              <ion-select-option value="tsp">teaspoons</ion-select-option>
              <ion-select-option value="serving">servings</ion-select-option>
              <ion-select-option value="piece">pieces</ion-select-option>
              <ion-select-option value="ml">milliliters</ion-select-option>
              <ion-select-option value="fl oz">fluid ounces</ion-select-option>
            </ion-select> -->
          </div>
        </ion-item>
        
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="removeItem(i)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <div class="empty-state" *ngIf="foodItems.length === 0">
      <ion-icon name="nutrition-outline" size="large"></ion-icon>
      <p>No food items found. Try entering a food description or add items manually.</p>
    </div>

    <ion-text color="danger" *ngIf="errorMessage">
      <p class="error-message">{{ errorMessage }}</p>
    </ion-text>

    <div class="button-container">
      <ion-button fill="outline" (click)="addNewItem()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Add Item
      </ion-button>
      <ion-button (click)="getNutritionData()" [disabled]="isLoading || foodItems.length === 0">
        <ion-icon name="calculator-outline" slot="start"></ion-icon>
        Get Nutrition Data
        <ion-spinner name="dots" *ngIf="isLoading"></ion-spinner>
      </ion-button>
    </div>
  </ion-card-content>
</ion-card>
