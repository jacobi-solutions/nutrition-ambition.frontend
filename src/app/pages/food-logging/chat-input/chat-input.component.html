<div class="chat-input-container">
  <ion-textarea
    [(ngModel)]="inputText"
    placeholder="Enter food description..."
    autoGrow="true"
    rows="1"
    (keydown.enter)="sendMessage(); $event.preventDefault()"
  ></ion-textarea>
  <ion-button 
    fill="clear" 
    (click)="sendMessage()" 
    [disabled]="!inputText.trim()">
    <ion-icon name="send" slot="icon-only"></ion-icon>
  </ion-button>
</div>
