<div class="message-container" [ngClass]="{
  'user-message': message.sender === 'user',
  'ai-message': message.sender === 'ai'
}">
  <div class="message-bubble">
    <p>{{ message.text }}</p>
    <div *ngIf="message.sender === 'ai' && message.nutritionData">
      <div *ngIf="message.matchQuality" class="match-quality-badge">
        {{ message.matchQuality }}
      </div>
      <ion-button 
        fill="clear"
        size="small"
        (click)="onViewDetailsClick()">
        View Details
      </ion-button>
    </div>
  </div>
  <!-- Optional: Add timestamp display here -->
  <!-- <span class="timestamp">{{ message.timestamp | date:'shortTime' }}</span> -->
</div>
